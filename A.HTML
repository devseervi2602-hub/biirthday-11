<!DOCTYPE html>
<html>
<head>
<title>Birthday Game 🎮</title>

<!-- ✍️ Handwriting Font -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
    background:black;
    color:#00ffcc;
    text-align:center;
    font-family:Courier New;
}

/* Game Area */
#gameArea{
    margin-top:100px;
}

button{
    padding:20px 40px;
    font-size:20px;
    background:#00ffcc;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#00ffaa;
}

/* Popup */
#popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:#00ffcc;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* ✍️ Message Styling */
#msg{
    font-family: 'Pacifico', cursive;
    font-size: 22px;
    color: #ffccff;
    text-shadow: 0 0 10px #ff99ff;
    margin-top:20px;
}

/* 🎊 Confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:0;
    animation: fall linear forwards;
}

@keyframes fall{
    from{transform:translateY(-10px);}
    to{transform:translateY(100vh);}
}
</style>

</head>

<body>

<h1>🎮 BIRTHDAY GAME 💚</h1>
<p>Click the button to unlock surprise 😎</p>

<div id="gameArea">
<button onclick="addScore()">CLICK ME 🐒</button>
<h2 id="score">Score: 0</h2>
</div>

<!-- 🎉 POPUP -->
<div id="popup">
<h1>🎉  BIRTHDAY FOOL AKKUUU 💚</h1>

<h2>🐒 Bandar Mode Activated 🐒</h2>

<p id="msg"></p>
</div>

<script src="script.js">
     
</script>
</body>
</html>
